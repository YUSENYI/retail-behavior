services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: retail_behavior
      MYSQL_USER: retail
      MYSQL_PASSWORD: retail
      MYSQL_ROOT_PASSWORD: retail_root
    ports:
      - "3306:3306"
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    env_file: .env.example
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - redis

  frontend:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql_data:
